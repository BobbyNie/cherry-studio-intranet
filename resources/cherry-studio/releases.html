<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Github Releases Timeline</title>
    <!--
      Network: fetches https://api.github.com/repos/kangfenmao/cherry-studio/releases
      In intranet/offline mode this host must be listed in CHERRY_NETWORK_ALLOWLIST.
    -->
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
        line-height: 1.6;
        min-height: 100vh;
      }

      body.theme-light {
        background: #f2f2f2;
        color: #111827;
      }

      body.theme-dark {
        background: #151515;
        color: #e5e7eb;
      }

      .container {
        max-width: 48rem;
        margin: 0 auto;
        padding: 3rem 1rem;
      }

      h1 {
        font-size: 1.875rem;
        font-weight: 700;
        margin-bottom: 2rem;
      }

      .loading,
      .error,
      .empty {
        text-align: center;
        padding: 2rem 0;
      }

      .error {
        color: #ef4444;
      }

      .spinner {
        display: inline-block;
        width: 2rem;
        height: 2rem;
        border: 4px solid #d1d5db;
        border-top-color: #3b82f6;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }

      body.theme-dark .spinner {
        border-color: #374151;
        border-top-color: #3b82f6;
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      .timeline {
        display: flex;
        flex-direction: column;
        gap: 2rem;
      }

      .release {
        position: relative;
        padding-left: 2rem;
        border-left: 2px solid #e5e7eb;
      }

      body.theme-dark .release {
        border-left-color: #374151;
      }

      .release::before {
        content: '';
        position: absolute;
        left: -0.45rem;
        top: 0.25rem;
        width: 0.75rem;
        height: 0.75rem;
        border-radius: 50%;
        background: #22c55e;
      }

      .card {
        border-radius: 0.5rem;
        padding: 1.5rem;
        box-shadow: 0 1px 2px rgba(0, 0, 0, 0.06);
      }

      body.theme-light .card {
        background: #fff;
      }

      body.theme-dark .card {
        background: #000;
      }

      .release-header {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        gap: 1rem;
        margin-bottom: 1rem;
      }

      .release-title {
        font-size: 1.25rem;
        font-weight: 600;
      }

      .release-date {
        font-size: 0.875rem;
        margin-top: 0.25rem;
        color: #6b7280;
      }

      body.theme-dark .release-date {
        color: #9ca3af;
      }

      .tag {
        display: inline-flex;
        align-items: center;
        border-radius: 9999px;
        padding: 0.25rem 0.75rem;
        font-size: 0.875rem;
        font-weight: 500;
        white-space: nowrap;
        background: #dcfce7;
        color: #166534;
      }

      body.theme-dark .tag {
        background: #14532d;
        color: #bbf7d0;
      }

      .prose {
        line-height: 1.6;
        color: #4b5563;
      }

      body.theme-dark .prose {
        color: #d1d5db;
      }

      .prose h1 {
        font-size: 1.5em;
        margin: 1em 0;
      }

      .prose h2 {
        font-size: 1.3em;
        margin: 0.8em 0;
      }

      .prose h3 {
        font-size: 1.1em;
        margin: 0.6em 0;
      }

      .prose ul {
        list-style-type: disc;
        margin: 0 0 1em 1.5em;
      }

      .prose ol {
        list-style-type: decimal;
        margin: 0 0 1em 1.5em;
      }

      .prose code {
        padding: 0.2em 0.4em;
        border-radius: 0.2em;
        font-size: 0.9em;
        background: #f3f4f6;
      }

      body.theme-dark .prose code {
        background: #1f2937;
      }

      .prose pre {
        margin: 1em 0;
        padding: 1em;
        overflow-x: auto;
        border-radius: 0.25rem;
        background: #f3f4f6;
      }

      body.theme-dark .prose pre {
        background: #1f2937;
      }

      .prose a {
        color: #3b82f6;
        text-decoration: underline;
      }

      body.theme-dark .prose a {
        color: #60a5fa;
      }

      .prose blockquote {
        border-left: 4px solid #e5e7eb;
        padding-left: 1em;
        margin: 1em 0;
        color: #6b7280;
      }

      body.theme-dark .prose blockquote {
        border-left-color: #374151;
        color: #9ca3af;
      }
    </style>
  </head>

  <body class="theme-light">
    <div class="container">
      <h1>Release Timeline</h1>
      <div id="status" class="loading">
        <div class="spinner" aria-hidden="true"></div>
      </div>
      <div id="releases" class="timeline" hidden></div>
    </div>

    <script>
      const GITHUB_RELEASES_API = 'https://api.github.com/repos/kangfenmao/cherry-studio/releases'

      function escapeHtml(text) {
        return text
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;')
      }

      /** Minimal markdown for release notes (offline, no CDN libs). */
      function renderMarkdown(content) {
        if (!content) return ''

        let html = escapeHtml(content)

        html = html.replace(/^### (.+)$/gm, '<h3>$1</h3>')
        html = html.replace(/^## (.+)$/gm, '<h2>$1</h2>')
        html = html.replace(/^# (.+)$/gm, '<h1>$1</h1>')
        html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
        html = html.replace(/\*(.+?)\*/g, '<em>$1</em>')
        html = html.replace(/`([^`]+)`/g, '<code>$1</code>')
        html = html.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank" rel="noopener">$1</a>')
        html = html.replace(/^- (.+)$/gm, '<li>$1</li>')
        html = html.replace(/(<li>.*<\/li>\n?)+/g, (block) => `<ul>${block}</ul>`)
        html = html.replace(/\n\n/g, '</p><p>')
        html = `<p>${html}</p>`
        html = html.replace(/<p><\/p>/g, '')

        return html
      }

      function formatDate(dateString) {
        return new Date(dateString).toLocaleDateString('en-US', {
          year: 'numeric',
          month: 'long',
          day: 'numeric'
        })
      }

      function initTheme() {
        const theme = new URL(window.location.href).searchParams.get('theme')
        document.body.className = theme === 'dark' ? 'theme-dark' : 'theme-light'
      }

      function showError(message) {
        const status = document.getElementById('status')
        status.className = 'error'
        status.textContent = message
        document.getElementById('releases').hidden = true
      }

      function renderReleases(releases) {
        const status = document.getElementById('status')
        const list = document.getElementById('releases')

        if (!releases.length) {
          status.className = 'empty'
          status.textContent = 'No releases found.'
          return
        }

        status.hidden = true
        list.hidden = false
        list.innerHTML = releases
          .map(
            (release) => `
          <article class="release">
            <div class="card">
              <div class="release-header">
                <div>
                  <div class="release-title">${escapeHtml(release.name || release.tag_name)}</div>
                  <div class="release-date">${formatDate(release.published_at)}</div>
                </div>
                <span class="tag">${escapeHtml(release.tag_name)}</span>
              </div>
              <div class="prose">${renderMarkdown(release.body || '')}</div>
            </div>
          </article>`
          )
          .join('')
      }

      async function fetchReleases() {
        try {
          const response = await fetch(GITHUB_RELEASES_API)
          if (!response.ok) {
            throw new Error('Failed to fetch releases')
          }
          renderReleases(await response.json())
        } catch (err) {
          showError('Error loading releases: ' + (err && err.message ? err.message : String(err)))
        }
      }

      initTheme()
      fetchReleases()
    </script>
  </body>
</html>
